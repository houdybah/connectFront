<fieldset class="border p-3 mb-4">
    <legend class="w-auto px-2">Details conteneurs</legend>  
    <div class="table-responsive">
      <table class="table table-striped table-bordered mb-0">
        <thead class="thead-dark">
          <tr>
            <th>ID</th>
            <th>TC</th>
            <th>Numero Conteneur</th>
            <th>Type </th>
            
            <!-- <th>Status de la sortie</th> -->
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let container of detailsConteneur;let i=index"
        >
            <td>{{i+1}}</td>
            <td>
                <span *ngIf="container.status"><img src="assets/images/rdv/car.png" alt="" height="40px" width="40px" srcset=""></span>
                <span *ngIf="!container.status"><img src="assets/images/rdv/container_2.png" alt="" height="40px" width="40px" srcset=""></span>
            </td>
            <td>{{ container.numeroConteneur }}</td>
            <!-- <td>40 RG</td> -->
           
            <td>{{ container.typeConteneur || 'N/A' }}</td>
            
            <!-- <td>
              <span class="badge" [ngClass]="container.out ? 'badge-success' : 'badge-danger'">
                {{ container.out ? 'Sortie' : 'En attente' }}
              </span>
            </td> -->
          </tr>
        </tbody>
      </table>
    </div>
  </fieldset>
