<div class="camions-sdt-wrapper">
  <!-- Header simple -->
  <div class="page-header">
    <div class="header-content">
      <h1 class="page-title">
        <i class="fas fa-truck"></i>
        Gestion des Camions - SDT
      </h1>
      <div class="header-actions">
        <button class="btn btn-outline-primary" (click)="refreshData()" [disabled]="loading">
          <i class="fas fa-sync-alt" [class.fa-spin]="loading"></i>
          Actualiser
        </button>
        <button class="btn btn-primary" (click)="nouveauCamion()">
          <i class="fas fa-plus"></i>
          Nouveau Camion
        </button>
      </div>
    </div>
  </div>

  <!-- Navigation simple -->
  <div class="sdt-navigation">
    <div class="nav-links">
      <a class="nav-link" (click)="navigateTo('/sdt/dashboard')">
        <i class="fas fa-tachometer-alt"></i>
        Tableau de Bord
      </a>
      <a class="nav-link" (click)="navigateTo('/sdt/chauffeurs')">
        <i class="fas fa-users"></i>
        Chauffeurs
      </a>
      <a class="nav-link" (click)="navigateTo('/sdt/affectations')">
        <i class="fas fa-link"></i>
        Affectations
      </a>
      <a class="nav-link" (click)="navigateTo('/sdt/lignes')">
        <i class="fas fa-route"></i>
        Lignes
      </a>
    </div>
  </div>

  <!-- Composant liste-camions intégré -->
  <div class="camions-content">
    <app-liste-camions></app-liste-camions>
  </div>
</div>
