<form [formGroup]="declarationForm" (ngSubmit)="onSubmit()">
    <div class="row">
      <div class="col-md-6">
       
        
        <div class="form-floating">
          <input type="number" id="anneeDeclaration" class="form-control custom-border" formControlName="anneeDeclaration" placeholder="Name">
          <label for="anneeDeclaration">Année de la declaration</label>
        </div>
        <div class="form-floating mt-3">
          <input type="number" id="codeBureau" class="form-control custom-border" formControlName="codeBureau" placeholder="Name">
          <label for="codeBureau">Code Bureau </label>
        </div>
        <div class="form-floating mt-3">
          <input type="number" id="numeroBl" class="form-control custom-border" formControlName="numeroBl" placeholder="Name" (blur)="getDeclaration()" [ngClass]="{ 'is-invalid': declarationForm.get('numeroBl')?.invalid && declarationForm.get('numeroBl')?.touched }">
          <label for="numeroBl">Numero de la Liquidation</label>
        </div>
        <div class="form-floating mt-3">
          <input type="text" id="reference" class="form-control custom-border" formControlName="reference" placeholder="Name">
          <label for="reference">Reference de la declaration</label>
        </div>
        <div class="form-floating mt-3">
          <input type="text" id="year" class="form-control custom-border" formControlName="montantLiquidation" placeholder="Name">
          <label for="year">Montant de la liquidation</label>
        </div>
        <div class="form-floating mt-3">
          <input type="text" id="montantLiquidation" class="form-control custom-border" formControlName="numeroQuittance" placeholder="Name">
          <label for="montantLiquidation">Quittance/Credit</label>
        </div>
      
        <!-- Select Field -->
        <!-- <div class="form-floating mt-3">
          <select id="country" class="form-select custom-border" formControlName="codeDeclarant" aria-label="codeDeclarant" placeholder="Select Country">
            <option value="" disabled selected hidden>Select Country</option>
            <option *ngFor="let c of ['France', 'England', 'Germany', 'Spain']" [value]="c">{{ c }}</option>
          </select>
          <label for="country">Country</label>
        </div> -->
       
      </div>

      <div class="col-md-6">
        <div class="form-floating ">
          <input type="text" id="bureau" class="form-control custom-border" formControlName="bureau" placeholder="Name">
          <label for="bureau">Bureau</label>
        </div>
        <div class="form-floating mt-3">
          <input type="text" id="year" class="form-control custom-border" formControlName="codeDeclarant" placeholder="Name">
          <label for="year">Code declarant</label>
        </div>
       
        <div class="form-floating mt-3">
          <input type="text" id="year" class="form-control custom-border" formControlName="codeNif" placeholder="Name">
          <label for="year">Entreprise</label>
        </div>
        <!-- <div class="form-floating mt-3">
          <input type="text" id="year" class="form-control custom-border" formControlName="statusSortie" placeholder="Name">
          <label for="year">Status</label>
        </div> -->
       
      </div>
    </div>

    <!-- <button type="submit" class="btn btn-primary" [disabled]="!declarationForm.valid">Soumettre</button> -->
  </form>
