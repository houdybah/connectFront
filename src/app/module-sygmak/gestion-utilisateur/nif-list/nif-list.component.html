
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<div class="card">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5>Liste des Utilisateurs</h5>
    <div class="d-flex">
      
<input
  type="text"
  class="form-control me-2"
  placeholder="Rechercher par NIF"
  [formControl]="rechercheNifControl"
/>


    </div>
   
    <button  class="btn btn-primary"  (click)="openModal(modal, null)" >
      <i class="bi bi-plus-circle"></i> Ajouter
    </button>
    
  </div>

  <div class="card-body">
    <table class="table table-bordered text-center">
      <thead class="table-light">
        <tr>
          <th>N°</th>
          <th>Utilisateur</th>
          <th>Code Nif</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let nifUtilisateur of pageData.content; let i = index">
          <td>{{ (pageSelectionne - 1) * nombreElementParPage + i + 1 }}</td>
          
          <td>
            {{ nifUtilisateur.utilisateur }}
          </td>
          <td>
            {{ nifUtilisateur.nif }}
          </td>
        
               
            <td>

           
            <button  class="btn btn-primary btn-sm" (click)="openModal(modal, nifUtilisateur)" > <i class="fa fa-pen"></i>
              
            </button>

          <button class="btn btn-danger btn-sm md-1" (click)="deleteNifUtilisateur(nifUtilisateur)">
  <i class="fa fa-trash"></i>
</button>

           
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

<div class="d-flex justify-content-between p-2">
  <ngb-pagination 
    [(page)]="pageSelectionne" 
    [pageSize]="nombreElementParPage" 
    [collectionSize]="nombreTotalEnregistrement" 
    (pageChange)="onPageChange($event)">
  </ngb-pagination>

  <select class="form-select" style="width: auto;" [(ngModel)]="nombreElementParPage" (change)="onPageSizeChange()">
    <option [ngValue]="5">5 éléments par page</option>
    <option [ngValue]="10">10 éléments par page</option>
    <option [ngValue]="20">20 éléments par page</option>
  </select>
</div>

 <ng-template #modal let-modal>
  <div class="modal-header">
    <h5 class="modal-title">Creation Compte</h5>
    <button
      type="button"
      class="btn-close"
      aria-label="Close"
      (click)="closeModal()"
    ></button>
  </div>
      
  <div class="modal-body">
    <app-nif-form [nifUtilisateurPassed]="nifUtilisateurParam" ></app-nif-form>
  </div>
</ng-template>
