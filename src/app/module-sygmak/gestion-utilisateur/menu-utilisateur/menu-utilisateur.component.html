<main id="main" class="main">
  <div class="card mx-auto p-2 custom-width">
    <h3 class="text-center mb-2">
      <u>Gestions Utilisateurs</u>
    </h3>

    <ul ngbNav #nav="ngbNav" class="nav nav-tabs">
      
      <!-- Onglet Utilisateur : tout le monde le voit -->
      <li [ngbNavItem]="1" class="nav-item">
        <a ngbNavLink class="nav-link">Utilisateur</a>
        <ng-template ngbNavContent>
          <app-list-utilisateur></app-list-utilisateur>
        </ng-template>
      </li>

      <!-- Onglet Entreprise : seulement pour admin -->
      <li *ngIf="isAdmin()" [ngbNavItem]="2" class="nav-item">
        <a ngbNavLink class="nav-link">Entreprise</a>
        <ng-template ngbNavContent>
          <app-entreprise-list></app-entreprise-list>
        </ng-template>
      </li>

      <!-- Onglet Référence Abonnement : seulement pour admin -->
      <li *ngIf="isAdmin()" [ngbNavItem]="3" class="nav-item">
        <a ngbNavLink class="nav-link">Reference Abonnement</a>
        <ng-template ngbNavContent>
          <app-reference-abonnement-list></app-reference-abonnement-list>
        </ng-template>
      </li>

        <li  [ngbNavItem]="4" class="nav-item">
        <a ngbNavLink class="nav-link">Rechargement</a>
        <ng-template ngbNavContent>
          <app-rechargement-list></app-rechargement-list>
        </ng-template>
      </li> 

    </ul>

    <div [ngbNavOutlet]="nav" class="mt-4"></div>
  </div>
</main>
