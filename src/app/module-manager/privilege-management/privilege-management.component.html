<div class="modal-backdrop" (click)="close()"></div>

<div class="modal-container" (click)="$event.stopPropagation()">
  <div class="modal-header">
    <h2>
      <i class="ri-shield-keyhole-line"></i>
      Gestion des Privilèges - {{ application.nom }}
    </h2>
    <button type="button" class="close-btn" (click)="close()">
      <i class="ri-close-line"></i>
    </button>
  </div>

  <div class="modal-body">
    <!-- Section: Créer un nouveau privilège -->
    <div class="section create-section">
      <h3><i class="ri-add-circle-line"></i> Nouveau Privilège</h3>
      <div class="privilege-form">
        <div class="form-row">
          <div class="form-group">
            <label>Nom du privilège <span class="required">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              [(ngModel)]="newPrivilege.nom" 
              placeholder="Ex: CREATE, READ, VALIDATE..."
              maxlength="50"
            />
          </div>
          <div class="form-group flex-grow">
            <label>Description <span class="required">*</span></label>
            <input 
              type="text" 
              class="form-control" 
              [(ngModel)]="newPrivilege.description" 
              placeholder="Description du privilège"
            />
          </div>
          <div class="form-group">
            <label>&nbsp;</label>
            <button 
              type="button" 
              class="btn btn-success" 
              (click)="saveNewPrivilege()"
              [disabled]="!newPrivilege.nom || !newPrivilege.description"
            >
              <i class="ri-add-line"></i> Créer
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Section: Liste des privilèges existants -->
    <div class="section list-section">
      <h3><i class="ri-list-check"></i> Privilèges Existants ({{ privileges.length }})</h3>

      <div *ngIf="isLoading" class="loading">
        <i class="ri-loader-4-line spin"></i> Chargement...
      </div>

      <div *ngIf="!isLoading && privileges.length === 0" class="no-data">
        <i class="ri-information-line"></i>
        Aucun privilège défini pour cette application
      </div>

      <div *ngIf="!isLoading && privileges.length > 0" class="privileges-table">
        <table>
          <thead>
            <tr>
              <th>Nom</th>
              <th>Description</th>
              <th class="actions-col">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let privilege of privileges" [class.editing]="isEditing && editingPrivilege?.uuid === privilege.uuid">
              <td>
                <span *ngIf="!isEditing || editingPrivilege?.uuid !== privilege.uuid" class="privilege-badge">
                  {{ privilege.nom }}
                </span>
                <input 
                  *ngIf="isEditing && editingPrivilege?.uuid === privilege.uuid"
                  type="text" 
                  class="form-control-sm" 
                  [(ngModel)]="editingPrivilege!.nom"
                />
              </td>
              <td>
                <span *ngIf="!isEditing || editingPrivilege?.uuid !== privilege.uuid">
                  {{ privilege.description }}
                </span>
                <input 
                  *ngIf="isEditing && editingPrivilege?.uuid === privilege.uuid"
                  type="text" 
                  class="form-control-sm" 
                  [(ngModel)]="editingPrivilege!.description"
                />
              </td>
              <td class="actions-col">
                <div *ngIf="!isEditing || editingPrivilege?.uuid !== privilege.uuid" class="action-buttons">
                  <button 
                    type="button" 
                    class="btn-icon btn-edit" 
                    (click)="startEdit(privilege)"
                    title="Modifier"
                  >
                    <i class="ri-edit-line"></i>
                  </button>
                  <button 
                    type="button" 
                    class="btn-icon btn-delete" 
                    (click)="deletePrivilege(privilege)"
                    title="Supprimer"
                  >
                    <i class="ri-delete-bin-line"></i>
                  </button>
                </div>
                <div *ngIf="isEditing && editingPrivilege?.uuid === privilege.uuid" class="action-buttons">
                  <button 
                    type="button" 
                    class="btn-icon btn-save" 
                    (click)="saveEdit()"
                    title="Sauvegarder"
                  >
                    <i class="ri-check-line"></i>
                  </button>
                  <button 
                    type="button" 
                    class="btn-icon btn-cancel" 
                    (click)="cancelEdit()"
                    title="Annuler"
                  >
                    <i class="ri-close-line"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div class="modal-footer">
    <button type="button" class="btn btn-secondary" (click)="close()">
      <i class="ri-close-line"></i> Fermer
    </button>
  </div>
</div>
