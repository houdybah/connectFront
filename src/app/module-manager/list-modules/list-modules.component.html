<!-- start page title -->
<div class="row">
  <div class="col-12">
    <div class="page-title-box d-sm-flex align-items-center justify-content-between">
      <h4 class="mb-sm-0">Gestion des Modules</h4>
      <div class="page-title-right">
        <ol class="breadcrumb m-0">
          <li class="breadcrumb-item"><a href="javascript: void(0);">Modules</a></li>
          <li class="breadcrumb-item active">Liste</li>
        </ol>
      </div>
    </div>
  </div>
</div>
<!-- end page title -->

<div class="row">
  <div class="col-lg-12">
    <div class="card">
      <div class="card-header">
        <div class="row align-items-center">
          <div class="col">
            <h5 class="card-title mb-0">Liste des Modules</h5>
          </div>
          <div class="col-auto">
            <button type="button" class="btn btn-primary" (click)="onCreate()">
              <i class="ri-add-line align-middle me-1"></i> Ajouter un Module
            </button>
          </div>
        </div>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-striped table-nowrap align-middle mb-0">
            <thead>
              <tr>
                <th scope="col">Nom</th>
                <th scope="col">Description</th>
                <th scope="col">Version</th>
                <th scope="col">Statut</th>
                <th scope="col">Dernière Mise à Jour</th>
                <th scope="col" class="text-end">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let module of modules">
                <td>
                  <div class="d-flex align-items-center">
                    <div class="flex-shrink-0">
                      <div class="avatar-sm bg-primary-subtle rounded">
                        <div class="avatar-title text-primary fs-16">
                          <i class="ri-module-line"></i>
                        </div>
                      </div>
                    </div>
                    <div class="flex-grow-1 ms-3">
                      <h6 class="mb-0">{{ module.name }}</h6>
                    </div>
                  </div>
                </td>
                <td>{{ module.description }}</td>
                <td>
                  <span class="badge bg-info-subtle text-info">{{ module.version }}</span>
                </td>
                <td>
                  <span [class]="getStatusClass(module.status)">{{ module.status }}</span>
                </td>
                <td>{{ module.lastUpdate }}</td>
                <td class="text-end">
                  <div class="dropdown d-inline-block">
                    <button class="btn btn-soft-secondary btn-sm dropdown" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                      <i class="ri-more-fill align-middle"></i>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end">
                      <li><a class="dropdown-item" href="javascript:void(0)" (click)="onEdit(module)"><i class="ri-pencil-fill align-bottom me-2 text-muted"></i> Modifier</a></li>
                      <li><a class="dropdown-item" href="javascript:void(0)" (click)="onDelete(module)"><i class="ri-delete-bin-fill align-bottom me-2 text-muted"></i> Supprimer</a></li>
                    </ul>
                  </div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
