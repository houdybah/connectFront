<div class="modal-body">
    <div class="container">
        <form  [formGroup]="journalForm" >

            <div class="row mb-3">
                <div class="col-6">
                    <label for="dateJournal" class="form-label">Date <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" id="dateJournal" formControlName="dateJournal" placeholder="Entrez la date"  />
                    <div *ngIf="journalForm.get('dateJournal')?.touched && journalForm.get('dateJournal')?.invalid" class="text-danger">
                        La date est requise
                    </div>
                </div>

                <div class="col-6">
                    <label for="uuidUnite" class="form-label">Unite <span class="text-danger">*</span></label>
                    <select class="form-control" id="uuidUnite" formControlName="uuidUnite">
                        <option disabled>Selectionner l'unité'</option>
                        <option *ngFor="let unite of unites" value="{{unite.uuid}}">{{unite.codeUnite}} - {{unite.nomUnite}}</option>
                    </select>
                    <div *ngIf="journalForm.get('uuidUnite')?.touched && journalForm.get('uuidUnite')?.invalid" class="text-danger">
                        L'unité est requis
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="emission" class="form-label">Emissions <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="emission" formControlName="emission" placeholder="Entrez la montant des emissions"  />
                    <div *ngIf="journalForm.get('emission')?.touched && journalForm.get('emission')?.invalid" class="text-danger">
                        Le montant des emissions est requis
                    </div>
                </div>

                <div class="col-6">
                    <label for="recouvrement" class="form-label">Recouvrements <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="recouvrement" formControlName="recouvrement" placeholder="Entrez le montant des recouvrements"  />
                    <div *ngIf="journalForm.get('recouvrement')?.touched && journalForm.get('recouvrement')?.invalid" class="text-danger">
                        Le montant des recouvrements est requis
                    </div>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="totalEmission" class="form-label">Total Emissions <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="totalEmission" formControlName="totalEmission" placeholder="Entrez la montant total des emissions"  />
                    <div *ngIf="journalForm.get('totalEmission')?.touched && journalForm.get('totalEmission')?.invalid" class="text-danger">
                        Le montant total des emissions est requis
                    </div>
                </div>

                <div class="col-6">
                    <label for="totalRecouvrement" class="form-label">Total Recouvrements <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="totalRecouvrement" formControlName="totalRecouvrement" placeholder="Entrez le montant total des recouvrements"  />
                    <div *ngIf="journalForm.get('totalRecouvrement')?.touched && journalForm.get('totalRecouvrement')?.invalid" class="text-danger">
                        Le montant total des recouvrements est requis
                    </div>
                </div>
            </div>


            <hr>
            <!--
            <div class="row">
                <div class="col-3">
                    <h5>Ventilation par Rubrique : </h5>
                </div>
                <div class="col-3">
                    <h3>+</h3>
                </div>
                <div class="col-3">
                    <h5>Ventilation par Compte : </h5>
                </div>
                <div class="col-3">
                    <h3>+</h3>
                </div>
            </div>
            -->
            <div class="row">
                <div class="col-6">
                    <!--
                    <table class="table table-bordered">
                        <tbody class="text-center">
                        <tr>
                            <td><i class="ri-play-mini-fill"></i></td>
                            <td><b>RSD : </b></td>
                            <td>100000000 FG </td>
                            <td>
                                <i class="ri-close-fill"></i>
                            </td>

                        </tr>
                        </tbody>
                    </table>
                    -->
                    <app-ventilation-rubrique></app-ventilation-rubrique>
                </div>
                <div class="col-6">
                    <!--
                    <table class="table table-bordered">
                        <tbody class="text-center">
                        <tr>
                            <td><i class="ri-play-mini-fill"></i></td>
                            <td><b>RSD : </b></td>
                            <td>100000000 FG </td>
                            <td>
                                <i class="ri-close-fill"></i>
                            </td>

                        </tr>
                        </tbody>
                    </table>
                    -->
                    <app-ventilation-compte></app-ventilation-compte>
                </div>

            </div>

            <hr>

            <!-- Soumettre le Formulaire -->
            <div class="d-flex justify-content-end">
                <button  class="btn btn-secondary "  [disabled]="isEnable" (click)="activer($event)" >Modifier</button>
                <button type="submit" class="btn btn-danger " [disabled]="!isEdit || !isEnable " (click)="delete(journal)" >Supprimer</button>
                <button type="submit" class="btn btn-success " [disabled]="!isEnable" (click)="Onsave()" >Valider</button>
            </div>

            <hr>

        </form>
    </div>
</div>
