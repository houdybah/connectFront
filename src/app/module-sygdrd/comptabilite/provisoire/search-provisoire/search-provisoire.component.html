<div class="card">
    <div class="card-body">
        <div class="card-header bg-primary text-white">
            <h5>Situation des Provisoires</h5>
        </div>
        <hr />
        <div class="d-flex ">
            <div class="col-4">
                <h5>Selectionner l'exercice :</h5>
            </div>
            <div class="col-6">
                <input type="year" class="form-control" id="annee" name="annee" [(ngModel)]="annee" (ngModelChange)="masquer()"/>
            </div>
            <div class="col-2">
                <button class="btn btn-outline-primary btn-md" [disabled]="!annee" title="rechercher"  (click)="selectPeriod()">Valider</button>
            </div>
        </div>
        <hr />
        <!-- Tableau -->
        <div class=" d-flex justify-content-center m-4" *ngIf="!periodSelect && !recherche">
            <h2 *ngIf="!periodSelect && !recherche">
                Veuillez valider la periode !
            </h2>
        </div>

        <div class=" d-flex justify-content-center m-4" *ngIf="!periodSelect && recherche">
            <div class=" spinner-border" role="status" >
                <span class="sr-only">Loading...</span>
            </div>
        </div>

        <div class="card-body border" [hidden]="!periodSelect">
            <ul ngbNav  #navKC="ngbNav" [(activeId)]="activeKeep" [destroyOnHide]="false" class="nav-tabs">

                <!-- <li [ngbNavItem]="1" [destroyOnHide]="true">
                    <a ngbNavLink>Graphiques</a>
                    <ng-template ngbNavContent>
                        <app-state-provisoire [situations]="situations"></app-state-provisoire>
                    </ng-template>
                </li> -->
                <li [ngbNavItem]="2" [destroyOnHide]="true">
                    <a ngbNavLink>Tableaux</a>
                    <ng-template ngbNavContent>
                        <app-table-provisoire [situations]="situations" ></app-table-provisoire>
                    </ng-template>
                </li>

                <li [ngbNavItem]="3" [destroyOnHide]="true" [disabled]="!isSI" ngbTooltip="Veuillez contacter le Service Informatique">
                    <a ngbNavLink>Editions</a>
                    <ng-template ngbNavContent>
                        
                    </ng-template>
                </li>
            </ul>
            <div [ngbNavOutlet]="navKC" class="mt-2"></div>
        </div>


    </div>
</div>

<ng-template #content role="document" let-modal >
    <div class="modal-header bg-primary p-3">
        <h5 class="modal-title" id="exampleModalLabel">Detail Provisoire</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="close-modal" (click)="modal.dismiss('Cross click')"></button>
    </div>

</ng-template>
