
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<div class="card">
    <div class="card-header d-flex justify-content-between align-items-center">
      <h5>Liste des Utilisateurs</h5>
      <div class="d-flex">
        <input type="text" class="form-control me-2" placeholder="Rechercher..." 
        />
        <button class="btn btn-primary">Rechercher</button>
     
  
      </div>
     
      <button  class="btn btn-primary"  (click)="openModal(modal, null)" >
        <i class="bi bi-plus-circle"></i> Ajouter
      </button>
    </div>
  
    <div class="card-body">
      <table class="table table-bordered text-center">
        <thead class="table-light">
          <tr>
            <th>Username</th>
            <th>Password</th>
            <th>Role</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr >
            <td>
         moussa
            </td>
            <td>
            ******************
            </td>
            <td>
                Admin
            </td>
            <td>
                Actif
            </td>
                 
              <td>
  
              <button class="btn btn-info btn-sm me-1" ><i class="fa fa-pencil"></i>
              </button>
              <button  class="btn btn-danger btn-sm" > <i class="fa fa-eye"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  
   <ng-template #modal let-modal>
    <div class="modal-header">
      <h5 class="modal-title">Creation Compte</h5>
      <button
        type="button"
        class="btn-close"
        aria-label="Close"
        (click)="closeModal()"
      ></button>
    </div>
        
    <div class="modal-body">
      <app-form-utilisateur ></app-form-utilisateur>
    </div>
  </ng-template>
