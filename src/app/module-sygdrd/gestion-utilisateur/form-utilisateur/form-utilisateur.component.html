<div class="modal-body">
    <div class="container">
      <form  [formGroup]="utilisateurForm">
        
        <!-- Champ Email -->
        <div class="mb-3">
          <label for="useremail" class="form-label">Email <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="useremail" formControlName="email" placeholder="Entrez votre adresse e-mail"  />
          <div class="text-danger">Veuillez entrer un email valide.</div>
        </div>

     
        

        <!-- Champ Mot de Passe -->
        <div class="mb-3">
          <label for="userpassword" class="form-label">Mot de passe <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="userpassword" formControlName="password" placeholder="Entrez votre mot de passe" />
          <div class="text-danger">Veuillez entrer un mot de passe.</div>
        </div>

        <!-- Champ de Confirmation de Mot de Passe -->
        <div class="mb-3">
          <label for="confirmPassword" class="form-label">Confirmer le mot de passe <span class="text-danger">*</span></label>
          <input type="password" class="form-control" id="confirmPassword" formControlName="password" placeholder="Confirmez votre mot de passe"   />
          <div class="text-danger">Veuillez confirmer votre mot de passe.</div>
        </div>

        <!-- Rôle -->
        <div class="mb-3">
          <label for="role" class="form-label">Rôle</label>
          <select class="form-select" id="role" formControlName="any" >
            <option value="admin">Administrateur</option>
            <option value="user">Utilisateur</option>
          </select>
        </div>

        <!-- Soumettre le Formulaire -->
        <div class="d-flex justify-content-end">
          <button type="submit" class="btn btn-success" >Créer un compte</button>
        </div>
        
      </form>
    </div>
  </div>
