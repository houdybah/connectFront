<div class="modal-body unite-modal">
    <div class="container p-0">

        <form [formGroup]="uniteForm">
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="codeUnite" class="form-label fw-bold">
                            <i class="fas fa-tag me-2"></i>Sigle <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="codeUnite" formControlName="codeUnite"
                               placeholder="Entrer le Sigle" (input)="onInputChange()">
                        <div *ngIf="uniteForm.get('codeUnite')?.touched && uniteForm.get('codeUnite')?.invalid"
                             class="invalid-feedback d-block">
                            <i class="fas fa-exclamation-circle me-1"></i>Le sigle est requis
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label for="nomUnite" class="form-label fw-bold">
                            <i class="fas fa-font me-2"></i>Nom <span class="text-danger">*</span>
                        </label>
                        <input type="text" class="form-control" id="nomUnite" formControlName="nomUnite"
                               placeholder="Entrer le Nom">
                        <div *ngIf="uniteForm.get('nomUnite')?.touched && uniteForm.get('nomUnite')?.invalid"
                             class="invalid-feedback d-block">
                            <i class="fas fa-exclamation-circle me-1"></i>Le nom est requis
                        </div>
                    </div>
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label for="typeUnite" class="form-label fw-bold">
                            <i class="fas fa-sitemap me-2"></i>Type <span class="text-danger">*</span>
                        </label>
                        <select class="form-select" id="typeUnite" formControlName="typeUnite">
                            <option value="" disabled>Sélectionner le type d'unité</option>
                            <option *ngFor="let typeUnite of typesUnites" [value]="typeUnite">{{typeUnite}}</option>
                        </select>
                        <div *ngIf="uniteForm.get('typeUnite')?.touched && uniteForm.get('typeUnite')?.invalid"
                             class="invalid-feedback d-block">
                            <i class="fas fa-exclamation-circle me-1"></i>Le type est requis
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="form-group">
                        <label for="uuidUnitePere" class="form-label fw-bold">
                            <i class="fas fa-project-diagram me-2"></i>Relève de <span class="text-danger">*</span>
                            <span *ngIf="isRootUnit && isEdit" class="text-info ms-2">
                                <i class="fas fa-info-circle"></i> Unité racine
                            </span>
                        </label>
                        <select class="form-select" id="uuidUnitePere" formControlName="uuidUnitePere"
                                [class.bg-light]="isRootUnit && isEnable">
                            <option value="" disabled>Sélectionner l'unité parent</option>
                            <option *ngFor="let unite of unites" [value]="unite.uuid">
                                {{unite.codeUnite}} / {{unite.nomUnite}}
                            </option>
                        </select>
                        <div *ngIf="uniteForm.get('uuidUnitePere')?.touched && uniteForm.get('uuidUnitePere')?.invalid"
                             class="invalid-feedback d-block">
                            <i class="fas fa-exclamation-circle me-1"></i>L'unité parent est requise
                        </div>
                        <small *ngIf="isRootUnit && isEnable" class="text-muted">
                            <i class="fas fa-lock me-1"></i>Vous ne pouvez pas modifier le parent d'une unité racine
                        </small>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="d-flex justify-content-end gap-2">
                <button *ngIf="isEdit" type="button" class="btn btn-outline-secondary" [disabled]="isEnable"
                        (click)="activer($event)">
                    <i class="fas fa-edit me-1"></i>Modifier
                </button>
                <button *ngIf="isEdit" type="button" class="btn btn-outline-danger" [disabled]="!isEdit || !isEnable"
                        (click)="delete(unite)">
                    <i class="fas fa-trash-alt me-1"></i>Supprimer
                </button>
                <button type="button" class="btn btn-primary" [disabled]="!isEnable || uniteForm.invalid" (click)="Onsave()">
                    <i class="fas fa-save me-1"></i>{{ isEdit ? 'Enregistrer' : 'Ajouter' }}
                </button>
            </div>
        </form>
    </div>
</div>
