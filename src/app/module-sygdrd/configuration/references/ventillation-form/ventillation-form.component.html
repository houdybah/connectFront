<div class="modal-body">
    <div class="container">
        <form  [formGroup]="ventillationParRubriqueForm" >
            <hr>
             <!-- Ventilation par rubrique - SECTION TOUJOURS VISIBLE -->
            <div class="ventilation-section">
                <div class="row mb-3">
                    <div class="col-6">
                        <label for="typeProduitRubriqueUuid" class="form-label">Nature recette</label>
                        <select class="form-control" id="typeProduitRubriqueUuid" formControlName="typeProduitRubriqueUuid" [disabled]="!isEdit">
                            <option value="" disabled selected>Sélectionner nature recette</option>
                            <option *ngFor="let typeProduitRubrique of natureRecette" [value]="typeProduitRubrique.uuid">
                                {{typeProduitRubrique.codeRubrique}} {{typeProduitRubrique.typeProduit}}
                            </option>
                        </select>
                    </div>

                    <div class="col-6">
                        <label for="montantInitial" class="form-label">Montant à ventiler</label>
                        <input type="number" class="form-control" id="montantInitial" formControlName="montantInitial" 
                               placeholder="Entrez le montant à ventiler" [disabled]="!isEdit" />
                    </div>
                </div>

                  <!--  
                <div class="row mb-3">
                    <div class="col-12 text-end">
                        <button type="button" class="btn btn-success"  (click)="Onsave()">
                            Ventiller
                        </button>
                    </div>
                </div>-->
            </div>
           <div class="d-flex justify-content-end">
                <button  class="btn btn-secondary "  [disabled]="isEnable" (click)="activer($event)" >Modifier</button>
                 <!-- (click)="delete(mensualisation)"  -->
                <button type="submit" class="btn btn-danger " [disabled]="!isEdit || !isEnable " >Supprimer</button>
                <button type="submit" class="btn btn-success " [disabled]="!isEnable" (click)="Onsave()" >Valider</button>
            </div>
        </form>
    </div>
</div>
