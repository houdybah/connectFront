<div class="modal-body">
    <div class="container">
        <form  [formGroup]="realisationForm" >

            <div class="row mb-3">
                <div class="col-6">
                    <label for="periode" class="form-label">Periode </label>
                    <input type="text" class="form-control" id="periode" formControlName="periode"/>
                </div>

                <div class="col-6">
                    <label for="totalPPAPTMERER" class="form-label">Total Recette </label>
                    <input type="number" class="form-control" id="totalPPAPTMERER" formControlName="totalPPAPTMERER"/>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="recettePP" class="form-label">Recette Petroliere </label>
                    <input type="number" class="form-control" id="recettePP" formControlName="recettePP"/>
                </div>

                <div class="col-6">
                    <label for="rer" class="form-label">RER </label>
                    <input type="number" class="form-control" id="rer" formControlName="rer"/>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="tme" class="form-label">Taxe Miniere d'Exportation </label>
                    <input type="number" class="form-control" id="tme" formControlName="tme"/>
                </div>

                <div class="col-6">
                    <label for="tmx" class="form-label">Taxe Miniere d'Extraction </label>
                    <input type="number" class="form-control" id="tmx" formControlName="tmx"/>
                </div>
            </div>

            <div class="row mb-3">
                <div class="col-6">
                    <label for="recetteAP" class="form-label">Recette Autres Produits </label>
                    <input type="number" class="form-control" id="recetteAP" formControlName="recetteAP"/>
                </div>

                <div class="col-6">
                    <label for="totalPPAP" class="form-label">Total Recette PP AP </label>
                    <input type="number" class="form-control" id="totalPPAP" formControlName="totalPPAP"/>
                </div>
            </div>

            <hr>

            <hr>
            <!-- Soumettre le Formulaire
            <div class="d-flex justify-content-end">
                <button  class="btn btn-secondary "  [disabled]="isEnable" (click)="activer($event)" >Modifier</button>
                <button type="submit" class="btn btn-danger " [disabled]="!isEdit || !isEnable " (click)="delete(realisation)" >Supprimer</button>
                <button type="submit" class="btn btn-success " [disabled]="!isEnable" (click)="Onsave()" >Valider</button>
            </div>
            -->
            <hr>

        </form>
    </div>
</div>
