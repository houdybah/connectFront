<div class="modal-body">
    <div class="container">
        <form  [formGroup]="quotaAnnuelForm" >

            <div class="row mb-3">
                <div class="col-6">
                    <label for="exerciceUuid" class="form-label">Exercice <span class="text-danger">*</span></label>
                    <select class="form-control" id="exerciceUuid" formControlName="exerciceUuid">
                        <option disabled>Selectionner l'exercice</option>
                        <option *ngFor="let exercice of exercices" value="{{exercice.uuid}}">{{exercice.annee}}</option>
                    </select>
                    <div *ngIf="quotaAnnuelForm.get('exerciceUuid')?.touched && quotaAnnuelForm.get('exerciceUuid')?.invalid" class="text-danger">
                        L'Exercice est requis
                    </div>
                </div>

                <div class="col-6">
                    <label for="montantInitial" class="form-label">Quota Initial <span class="text-danger">*</span></label>
                    <input type="number" class="form-control" id="montantInitial" formControlName="montantInitial" placeholder="Entrez le quota Initial"  />
                    <div *ngIf="quotaAnnuelForm.get('montantInitial')?.touched && quotaAnnuelForm.get('montantInitial')?.invalid" class="text-danger">
                        Le montant Initial est requis
                    </div>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-6">
                    <label for="montantRectificatif" class="form-label">Quota Rectificatif </label>
                    <input type="number" class="form-control" id="montantRectificatif" formControlName="montantRectificatif" placeholder="Entrez le quota Rectificatif"  />
                    <div *ngIf="quotaAnnuelForm.get('montantRectificatif')?.touched && quotaAnnuelForm.get('montantRectificatif')?.invalid" class="text-danger">
                        Le montant Rectificatif est requis
                    </div>
                </div>

                <div class="col-6">
                    <label for="montantFinal" class="form-label">Quota Final </label>
                    <input type="number" class="form-control" id="montantFinal" formControlName="montantFinal" placeholder="Entrez le quota Final"  />
                    <div *ngIf="quotaAnnuelForm.get('montantFinal')?.touched && quotaAnnuelForm.get('montantFinal')?.invalid" class="text-danger">
                        Le montant Final est requis
                    </div>
                </div>
            </div>
            <hr>




            <hr>
            <!-- Soumettre le Formulaire -->
            <div class="d-flex justify-content-end">
                <button  class="btn btn-secondary "  [disabled]="isEnable" (click)="activer($event)" >Modifier</button>
                <button type="submit" class="btn btn-danger " [disabled]="!isEdit || !isEnable " (click)="delete(quotaAnnuel)" >Supprimer</button>
                <button type="submit" class="btn btn-success " [disabled]="!isEnable" (click)="Onsave()" >Valider</button>
            </div>

            <hr>

        </form>
    </div>
</div>
