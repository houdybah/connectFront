<header id="page-topbar" data-scroll-header (window:scroll)="windowScroll()" class="bg-primary">
    <div class="layout-width">
        <div class="navbar-header">
            <div class="d-flex align-items-center">
                <!-- LOGO -->
                <div class="navbar-brand-box horizontal-logo logo-clickable" 
                     (click)="backToApplications()"
                     (keydown.enter)="backToApplications()"
                     [class.has-app]="selectedApp"
                     tabindex="0"
                     role="button"
                     title="Retour au sélecteur d'applications">
                    <a class="logo-lg">
                        <b><h2 class="p-4 mt-2"><b> <img src="assets/images/DGD.png" alt="" height="70"> APP-DGD</b></h2></b>
                    </a>
                </div>

                <button type="button" class="btn btn-sm px-3 fs-16 header-item vertical-menu-btn topnav-hamburger material-shadow-none" id="topnav-hamburger-icon" (click)="toggleMobileMenu($event)">
                    <span class="hamburger-icon">
                        <span></span>
                        <span></span>
                        <span></span>
                    </span>
                </button>
            </div>

            <!-- Label Application Centrée -->
            @if(selectedApp) {
            <div class="app-name-center">
                <div class="app-name-badge">
                    <i class="ri-checkbox-circle-fill me-2"></i>
                    <span class="app-name-text">{{ getSelectedAppName() }}</span>
                </div>
            </div>
            }

            <div class="d-flex align-items-center">

               

                <div class="dropdown ms-sm-3 header-item topbar-user" ngbDropdown>
                    <button type="button" class="btn material-shadow-none" id="page-header-user-dropdown" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false" ngbDropdownToggle>
                        <span class="d-flex align-items-center">
                            <img class="rounded-circle header-profile-user" src="assets/images/users/avatar-1.jpg" alt="Header Avatar">
                            <span class="text-start ms-xl-2">
                                <span class="d-none d-xl-inline-block ms-1 fw-medium user-name-text">{{userData}}</span>
                               
                            </span>
                        </span>
                    </button>
                    <div class="dropdown-menu dropdown-menu-end" ngbDropdownMenu>
                        @if(selectedApp) {
                        <a class="dropdown-item" href="javascript: void(0);" (click)="backToApplications()">
                            <i class="ri-apps-line text-muted fs-16 align-middle me-1"></i> 
                            <span class="align-middle">Sélecteur d'applications</span>
                        </a>
                        <div class="dropdown-divider"></div>
                        }
                        <a class="dropdown-item" href="javascript: void(0);" (click)="logout()">
                            <i class="mdi mdi-logout text-muted fs-16 align-middle me-1"></i> 
                            <span class="align-middle" data-key="t-logout">Logout</span>
                        </a>
                    </div>

                    

                </div>
            </div>
        </div>
    </div>
</header>

<ng-template #removenotification let-modal>

    <div class="modal-content">
        <div class="modal-header">
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close" id="NotificationModalbtn-close" (click)="modal.dismiss('Cross click')"></button>
        </div>
        <div class="modal-body">
            <div class="mt-2 text-center">
            
                <div class="mt-4 pt-2 fs-15 mx-4 mx-sm-5">
                    <h4>Are you sure ?</h4>
                    <p class="text-muted mx-4 mb-0">Are you sure you want to remove this Notification ?</p>
                </div>
            </div>
            <div class="d-flex gap-2 justify-content-center mt-4 mb-2">
                <button type="button" class="btn w-sm btn-light" data-bs-dismiss="modal" (click)="modal.dismiss('Cross click')">Close</button>
                <button type="button" class="btn w-sm btn-danger" id="delete-notification" (click)="notificationDelete()">Yes, Delete It!</button>
            </div>
        </div>

    </div>

</ng-template>
